<svg width="1000" height="280" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe1ef"/>
      <stop offset="45%" stop-color="#d8f1ff"/>
      <stop offset="100%" stop-color="#fff0f7"/>
    </linearGradient>

    <radialGradient id="pinkCloud" cx="25%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffd1e6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffd1e6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueCloud" cx="72%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#c7ecff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c7ecff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="softWhite" cx="50%" cy="78%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#d6a8c8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="280" rx="32" fill="url(#base)"/>
  <rect width="1000" height="280" rx="32" fill="url(#pinkCloud)"/>
  <rect width="1000" height="280" rx="32" fill="url(#blueCloud)"/>
  <rect width="1000" height="280" rx="32" fill="url(#softWhite)"/>

  <g fill="#e95b8a" opacity="0.72">
    <text x="130" y="70" font-size="22">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3s" repeatCount="indefinite"/>
    </text>

    <text x="210" y="190" font-size="16">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -6; 0 0" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="2.6s" repeatCount="indefinite"/>
    </text>

    <text x="300" y="92" font-size="14">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 4 -6; 0 0" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3.4s" repeatCount="indefinite"/>
    </text>

    <text x="395" y="220" font-size="20">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; -3 -7; 0 0" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.8;0.35" dur="3.1s" repeatCount="indefinite"/>
    </text>

    <text x="585" y="72" font-size="15">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 3 -7; 0 0" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="2.8s" repeatCount="indefinite"/>
    </text>

    <text x="685" y="205" font-size="18">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -8; 0 0" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3.3s" repeatCount="indefinite"/>
    </text>

    <text x="785" y="105" font-size="22">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; -4 -8; 0 0" dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="2.9s" repeatCount="indefinite"/>
    </text>

    <text x="875" y="185" font-size="15">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 2 -6; 0 0" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="3.5s" repeatCount="indefinite"/>
    </text>

    <text x="105" y="215" font-size="14">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; -2 -5; 0 0" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.8;0.35" dur="2.7s" repeatCount="indefinite"/>
    </text>

    <text x="890" y="70" font-size="18">♥
      <animateTransform attributeName="transform" type="translate" values="0 0; 3 -7; 0 0" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="3.2s" repeatCount="indefinite"/>
    </text>
  </g>

  <g filter="url(#softShadow)">
    <text x="500" y="140" text-anchor="middle"
          font-family="'Segoe Script', 'Brush Script MT', 'Lucida Handwriting', cursive"
          font-size="72"
          font-weight="600"
          fill="#b76e9f">
      Yana Ly
    </text>

    <text x="500" y="185" text-anchor="middle"
          font-family="Verdana, sans-serif"
          font-size="22"
          font-weight="600"
          fill="#8b7bb8">
      Welcome to my GitHub
    </text>
  </g>
</svg>
